<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suzume: The Closer Prototype</title>
    <link rel="stylesheet" href="key_closure_game.css">
</head>
<body>

<div id="game-container">

    <!-- DEBUG -->
    <div id="debug-panel">
        <button onclick="skipTo('push')">Skip to Push</button>
        <button onclick="skipTo('memory')">Skip to Memory</button>
        <button onclick="skipTo('puzzle')">Skip to Puzzle</button>
        <button onclick="skipTo('lock')">Skip to Lock</button>
    </div>

    <!-- BACKGROUND VIDEO -->
    <div id="video-bg-container">
        <video id="vid-menu" class="bg-video active-vid" autoplay muted loop playsinline poster="assets/menu-poster.jpg">
            <source src="assets/menu-bg.mp4" type="video/mp4">
        </video>
        <video id="vid-push" class="bg-video" muted loop playsinline>
            <source src="assets/worm-appearing.mp4" type="video/mp4">
        </video>
        <video id="vid-memory" class="bg-video" muted loop playsinline>
            <source src="assets/starry-sky.mp4" type="video/mp4">
        </video>
        <video id="vid-puzzle" class="bg-video" muted loop playsinline>
            <source src="assets/final-glow.mp4" type="video/mp4">
        </video>
        <video id="vid-lock" class="bg-video" muted loop playsinline>
            <source src="assets/door-close-up.mp4" type="video/mp4">
        </video>
        <video id="vid-success" class="bg-video" muted loop playsinline>
            <source src="assets/victory-landscape.mp4" type="video/mp4">
        </video>
    
        <div id="video-overlay"></div>
    </div>

    <!-- TIMER -->
    <div id="timer">Time: 25</div>

    <!-- Language -->
    <div id="lang-switcher" onclick="event.stopPropagation(); toggleLanguage()">EN</div>
    

    <!-- SECTIONS -->
    <section id="phase-menu" class="phase active">
        <div class="logo-container">
            <img src="assets/Suzume_no_Tojimari_logo.png" alt="Suzume Logo" class="main-logo">
        </div>
        <p data-i18n="menu_tap">Tap anywhere to begin the ritual</p>
    </section>

    <section id="phase-push" class="phase">
        <h2 data-i18n="push_title">CLOSE THE DOOR!</h2>
        <div class="meter-bar"><div id="push-progress" class="progress"></div></div>
        <p class="blink" data-i18n="push_mash">MASH THE SCREEN</p>
    </section>

    <section id="phase-memory" class="phase">
        <h2 data-i18n="mem_title">RECALL MEMORIES</h2>
        <div class="meter-bar"><div id="memory-progress" class="progress"></div></div>
        <p class="blink" data-i18n="mem_desc">CLICK ON THE WHITE SPOTS</p>
    </section>

    <section id="phase-puzzle" class="phase">
        <div id="puzzle-zone">
            <h2 class="ui-label" data-i18n="puz_title">RESTORE THE KEYHOLE</h2>
            <div class="target-grid" id="target-grid"></div>
        </div>
    </section>

    <section id="phase-lock" class="phase">
        <h1 class="glow-text" data-i18n="lock_title">TAP THE LOCK</h1>
        <div id="final-lock-btn"></div>
    </section>

    <section id="phase-success" class="phase">
        <h1 class="glow-text" style="font-size: 3rem;" data-i18n="success_title">THE DOOR IS SEALED</h1>
        
        <div id="score-summary" style="margin: 20px 0; font-family: monospace;"></div>
        
        <p style="font-style: italic; color: #ccc;" data-i18n="success_quote">"I call upon you..."</p>
        <button onclick="location.reload()" class="retry-btn" data-i18n="retry_btn">RETURN TO MENU</button>
    </section>
</div>

<script src="key_closure_game.js"></script>
</body>
</html>
